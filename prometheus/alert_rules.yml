groups:
  - name: mock_app_alerts
    interval: 30s
    rules:
      - alert: MockAppHighErrorRate
        expr: (sum(increase(http_requests_total{status=~"5.."}[2m])) / sum(increase(http_requests_total[2m]))) > 0.03
        for: 30s
        labels:
          severity: critical
          service: mock-app
        annotations:
          summary: "High error rate detected in mock application"
          description: "5xx error rate is above 3% over the last 2 minutes."

      - alert: MockAppSlowResponses
        expr: histogram_quantile(0.95, sum by (le) (increase(http_response_duration_seconds_bucket[2m]))) > 0.5
        for: 30s
        labels:
          severity: warning
          service: mock-app
        annotations:
          summary: "Mock application response times are elevated"
          description: "95th percentile response time is above 0.5 seconds over the last 2 minutes."

      - alert: MockAppHighCPUUtilization
        expr: max(system_cpu_utilization) >= 0.95
        for: 15s
        labels:
          severity: critical
          service: mock-app
        annotations:
          summary: "Mock application CPU utilization is high"
          description: "CPU utilization is at or above 95%."

      - alert: MockAppHighMemoryUtilization
        expr: max(system_memory_utilization) >= 0.95
        for: 15s
        labels:
          severity: critical
          service: mock-app
        annotations:
          summary: "Mock application memory utilization is high"
          description: "Memory utilization is at or above 95%."

      - alert: MockAppMetricsFlowing
        expr: max(up{job="otel-collector"}) == 1
        for: 15s
        labels:
          severity: warning
          service: mock-app
        annotations:
          summary: "Mock application metrics are flowing through OTEL"
          description: "Telemetry is reaching Prometheus through the collector."
