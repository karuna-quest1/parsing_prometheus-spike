global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_SMARTHOST}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_AUTH_USERNAME}'
  smtp_auth_password: '${SMTP_AUTH_PASSWORD}'
  smtp_require_tls: true

# Templates for notifications
templates:
  - '/etc/alertmanager/*.tmpl'

# Route tree for alerts
route:
  # Default receiver for any alert without a severity label match.
  receiver: 'default-receiver'
  
  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service']
  
  # How long to wait before sending initial notification
  group_wait: 10s
  
  # How long to wait before sending notification about new alerts
  group_interval: 10s
  
  # How long to wait before resending notification
  repeat_interval: 12h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 5s
      repeat_interval: 4h

    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 30s
      repeat_interval: 12h

# Inhibition rules - suppress certain alerts when others are firing
inhibit_rules:
  # Suppress warning if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Receivers - where to send notifications
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: '${ALERT_EMAIL_DEFAULT_TO}'
        send_resolved: true
        headers:
          subject: '[INFO] {{ .CommonLabels.alertname }}'
        html: |
          <p>Severity: {{ .CommonLabels.severity }}</p>
          <p>{{ range .Alerts }}{{ .Annotations.summary }}<br/>{{ .Annotations.description }}{{ end }}</p>

  - name: 'critical-receiver'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        send_resolved: true
        channel: '${SLACK_CHANNEL_CRITICAL}'
        title: '[CRITICAL] {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }} - {{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: '${ALERT_EMAIL_CRITICAL_TO}'
        send_resolved: true
        headers:
          subject: '[CRITICAL] {{ .CommonLabels.alertname }}'
        html: |
          <p>Severity: critical</p>
          <p>{{ range .Alerts }}{{ .Annotations.summary }}<br/>{{ .Annotations.description }}{{ end }}</p>

  - name: 'warning-receiver'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_WARNING}'
        send_resolved: true
        channel: '${SLACK_CHANNEL_WARNING}'
        title: '[WARNING] {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }} - {{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: '${ALERT_EMAIL_WARNING_TO}'
        send_resolved: true
        headers:
          subject: '[WARNING] {{ .CommonLabels.alertname }}'
        html: |
          <p>Severity: warning</p>
          <p>{{ range .Alerts }}{{ .Annotations.summary }}<br/>{{ .Annotations.description }}{{ end }}</p>
